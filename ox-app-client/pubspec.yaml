name: ox_app_client
description: OX Field Services — App Cliente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & Auth
  dio: ^5.4.0
  supabase_flutter: ^2.3.0

  # Navegação
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # UI
  google_fonts: ^6.2.1
  lucide_flutter: ^1.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Funcionalidades
  image_picker: ^1.0.7
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.1.2
  shared_preferences: ^2.2.3
  intl: ^0.20.0
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.3

  # Links externos (OAuth redirect)
  url_launcher: ^6.2.6

  # Pagamentos
  flutter_stripe: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.webp
  adaptive_icon_background: "#0d3d3d"
  adaptive_icon_foreground: assets/logo.webp

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/logo.webp
    - assets/images/
    - assets/lottie/
